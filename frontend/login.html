<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Sign In — QuickInvoice</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <main id="main-content" class="container">
    <div class="auth-card card">
      <div class="auth-title">
        <h1 style="font-size:1.75rem; margin-bottom:.25rem;">QuickInvoice</h1>
        <p class="text-muted">Sign in to your account</p>
      </div>

      <div id="alert" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

      <form id="login-form" novalidate data-testid="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email <span class="required" aria-hidden="true">*</span></label>
          <input
            type="email" id="email" name="email"
            class="form-control" autocomplete="email"
            required maxlength="254" aria-required="true"
            data-testid="login-email-input"
          >
          <span id="email-error" class="form-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password <span class="required" aria-hidden="true">*</span></label>
          <input
            type="password" id="password" name="password"
            class="form-control" autocomplete="current-password"
            required maxlength="128" aria-required="true"
            data-testid="login-password-input"
          >
          <span id="password-error" class="form-error" role="alert"></span>
        </div>

        <div style="text-align:right; margin-bottom:1rem;">
          <a href="/reset-password.html" class="text-sm">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;" data-testid="login-submit-button">
          Sign In
        </button>
      </form>

      <p class="text-center text-sm mt-4">
        Don't have an account? <a href="/register.html">Create one</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { apiLogin } from './js/api-client.js';

    const form = document.getElementById('login-form');
    const alert = document.getElementById('alert');

    function showAlert(msg) {
      alert.textContent = msg;
      alert.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = form.querySelector('[type=submit]');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      alert.classList.add('hidden');

      try {
        const res = await apiLogin(email, password);
        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          const { error } = await res.json().catch(() => ({ error: 'Sign in failed' }));
          showAlert(error || 'Sign in failed. Please try again.');
        }
      } catch {
        showAlert('Network error. Please check your connection.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
